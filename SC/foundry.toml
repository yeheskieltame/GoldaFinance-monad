[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

[rpc_endpoints]
monad-testnet = "https://testnet-rpc.monad.xyz"
monad-mainnet = "https://rpc.monad.xyz"

# Etherscan API v2 — one key works across all supported chains.
# Docs: https://info.etherscan.com/etherscan-api-v2-multichain/
# Get a key: https://etherscan.io/myapikey
[etherscan]
monad-testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api", chain = 10143 }
monad-mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api", chain = 143 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
